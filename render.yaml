services:
  - type: web
    name: marketplace-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString
      - key: BASE_URL
        sync: false

databases:
  - name: marketplace-db
    plan: free
    databaseName: marketplace_db
